<!DOCTYPE html>
<html>
<head>
<title>Operation on string in Javascript</title>
<style>
body{
font-family:Arial;
text-align:center;
background:#f4f4f4;
}
h1{
background:#222;
color:white;
padding:15px;
}
textarea{
width:60%;
height:60px;
margin:20px;
}
button{
padding:10px 15px;
margin:5px;
border:1px solid gray;
background:white;
cursor:pointer;
}
#result{
margin-top:20px;
background:#555;
color:white;
padding:15px;
width:40%;
margin-left:auto;
margin-right:auto;
border-radius:20px;
}
</style>
</head>

<body>

<h1>Operation on string in Javascript</h1>

<textarea id="text" placeholder="Add paragraph here"></textarea>

<div id="result">Result</div>

<div>

<button onclick="countVowels()">Check Vowels</button>
<button onclick="checkPalindrome()">Check palindrome</button>
<button onclick="firstWord()">Extract First Word</button>
<button onclick="replaceSpaces()">Replace spaces with hyphens</button>
<button onclick="splitWords()">Split words</button>
<button onclick="capitaliseWords()">Capitalise</button>
<button onclick="reverseString()">Reverse characters</button>
<button onclick="countCharacter()">Count character</button>
<button onclick="removeNonAlpha()">Remove non alphabets</button>
<button onclick="checkStartEnd()">Start and End same</button>

</div>

<script>

function getText(){
return document.getElementById("text").value
}

function show(res){
document.getElementById("result").innerText=res
}

function countVowels(){
let str=getText()
let v="aeiouAEIOU"
let c=0
for(let i=0;i<str.length;i++){
if(v.includes(str[i])) c++
}
show("Vowels: "+c)
}

function checkPalindrome(){
let str=getText().replace(/\s/g,"")
let rev=str.split("").reverse().join("")
show(str===rev?"Palindrome":"Not Palindrome")
}

function firstWord(){
let str=getText().trim()
let word=str.split(" ")[0]
show(word)
}

function replaceSpaces(){
let str=getText()
show(str.replaceAll(" ","-"))
}

function splitWords(){
let str=getText()
let arr=str.split(" ")
show(arr.join(", "))
}

function capitaliseWords(){
let str=getText().toLowerCase().split(" ")
let res=""
for(let i=0;i<str.length;i++){
res+=str[i].charAt(0).toUpperCase()+str[i].slice(1)+" "
}
show(res.trim())
}

function reverseString(){
let str=getText()
let r=""
for(let i=str.length-1;i>=0;i--){
r+=str[i]
}
show(r)
}

function countCharacter(){
let str=getText()
let ch=prompt("Enter character")
let c=0
for(let i=0;i<str.length;i++){
if(str[i]===ch) c++
}
show("Count: "+c)
}

function removeNonAlpha(){
let str=getText()
show(str.replace(/[^a-zA-Z ]/g,""))
}

function checkStartEnd(){
let str=getText().trim()
if(str.length==0) show("Empty")
else show(str[0]===str[str.length-1]?"Same":"Different")
}

</script>

</body>
</html>
